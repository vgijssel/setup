# Default values for tenant chart

# Name of the tenant
name: argocd

# Annotations to add to the tenant resource
annotations: {}

# Tenant spec configuration
spec:
  # Enable etcd for the tenant
  etcd: false

  # Host configuration for the tenant
  host: ""

  # Enable ingress for the tenant
  ingress: false

  # Enable monitoring for the tenant
  monitoring: false

  # Enable seaweedfs for the tenant
  seaweedfs: false
