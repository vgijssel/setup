language: javascript
layer: library
tags:
  - devenv
  - chezmoi
  - development-environment
  - macos
  - devenv
  - chezmoi
  - development-environment
  - macos
tasks:
  apply:
    command: chezmoi-wrapper apply --force --verbose
    deps:
      - vendir:build
    options:
      cache: false

  test:
    script: goss validate
    deps:
      - devenv:apply
    inputs:
      - glob: files/**/*
        cache: true
      - file: goss.yaml
      - file: chezmoi.yaml
      - file: /.chezmoiroot
      - "@globs(chezmoi_bin)"
      - "@globs(claude_bin)"
    options:
      cache: true
