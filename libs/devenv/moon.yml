language: javascript
layer: library
fileGroups:
  chezmoi_bin:
    - /bin/chezmoi
    - /bin/.chezmoi-*
    - /bin/hermit
    - /bin/chezmoi-wrapper
  claude_bin:
    - /bin/claude
    - /bin/.claude-code-*
    - /bin/hermit
tags:
  - devenv
  - chezmoi
  - development-environment
  - macos
  - devenv
  - chezmoi
  - development-environment
  - macos
tasks:
  apply:
    command: chezmoi-wrapper apply --force --verbose
    options:
      runInCI: false
      interactive: true
  test:
    script: chezmoi-wrapper apply --force --verbose && goss validate
    deps:
      - vendir:build
    inputs:
      - glob: files/**/*
        cache: true
      - file: goss.yaml
      - file: chezmoi.yaml
      - file: /.chezmoiroot
      - "@globs(chezmoi_bin)"
      - "@globs(claude_bin)"
    options:
      cache: true
