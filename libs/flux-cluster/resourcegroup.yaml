# FluxCluster ResourceGraphDefinition
# This kro resource defines the FluxCluster CRD that composes:
# - k3k Cluster
# - Flux GitRepository
# - Flux Kustomization
# - Optional CoreDNS custom ConfigMap (when dns.services is non-empty)
# - Optional SecretStore and PushSecrets (when hostSync.secrets.enabled is true)
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: fluxcluster
spec:
  schema:
    apiVersion: v1alpha1
    kind: FluxCluster
    spec:
      # k3k ClusterSpec fields - see https://rancher.github.io/k3k-product-docs/k3k/1.0.2/en/references/crds.html
      servers: integer | default=1
      agents: integer | default=0
      version: string | default="v1.34.4-k3s1"
      mode: string | default="shared"
      serviceCIDR: string | default="10.96.0.0/16"
      clusterDNS: string | default="10.96.0.10"
      tlsSANs: "[]string"
      # Expose specifies options for exposing the API server
      # Only one of nodePort, loadBalancer, or ingress should be set
      expose:
        nodePort:
          serverPort: integer
          etcdPort: integer
        loadBalancer:
          serverPort: integer
          etcdPort: integer
        ingress:
          ingressClassName: string
          annotations: "map[string]string"
      persistence:
        type: string | default="dynamic"
        storageRequestSize: string | default="2G"
      sync:
        secrets:
          enabled: boolean | default=false
        configMaps:
          enabled: boolean | default=true
        services:
          enabled: boolean | default=true
        persistentVolumeClaims:
          enabled: boolean | default=false
        ingresses:
          enabled: boolean | default=false
        priorityClasses:
          enabled: boolean | default=false

      # FluxCluster-specific fields
      flux:
        branch: string | required=true
        path: string | required=true
        timeout: string | default="2m"
        interval: string | default="30m"
        retryInterval: string | default="30s"

      # DNS forwarding configuration
      dns:
        hostIp: string | default="10.96.0.10"
        services: "[]string"

      # Host-to-tenant secret synchronization
      hostSync:
        secrets:
          enabled: boolean | default=false
          selectors: "[]string"

    # status fields will be added after resources are defined (Tasks 3-5)
    # status:
    #   clusterReady: ${cluster.status.clusterCIDR != ""}
    #   kustomizationReady: ${kustomization.status.conditions.filter(c, c.type == "Ready")[0].status == "True"}

  resources:
    # Task 3: k3k Cluster resource
    - id: cluster
      template:
        apiVersion: k3k.io/v1beta1
        kind: Cluster
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          servers: ${schema.spec.servers}
          agents: ${schema.spec.agents}
          version: ${schema.spec.version}
          mode: ${schema.spec.mode}
          serviceCIDR: ${schema.spec.serviceCIDR}
          clusterDNS: ${schema.spec.clusterDNS}
          tlsSANs: ${schema.spec.tlsSANs}
          expose: ${schema.spec.expose}
          persistence: ${schema.spec.persistence}
          sync: ${schema.spec.sync}
          # Task 8: k3k addons for DNS forwarding
          # Conditionally includes addon reference when dns.services is configured
          addons: '${has(schema.spec.dns) && has(schema.spec.dns.services) && size(schema.spec.dns.services) > 0 ? [{"secretNamespace": schema.metadata.namespace, "secretRef": schema.metadata.name + "-coredns-addon"}] : []}'

    # Task 4: GitRepository resource - points to setup repository
    # Created in the same namespace as the FluxCluster
    - id: gitrepository
      template:
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: GitRepository
        metadata:
          name: setup-${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          interval: ${schema.spec.flux.interval}
          timeout: ${schema.spec.flux.timeout}
          url: https://github.com/vgijssel/setup
          ref:
            branch: ${schema.spec.flux.branch}

    # ConfigMap for Kustomize postBuild variable substitution
    # Contains environment variables that downstream Kustomizations can reference
    - id: configmap
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.metadata.name}-vars
          namespace: ${schema.metadata.namespace}
        data:
          FLUX_BRANCH: ${schema.spec.flux.branch}
          FLUX_NAMESPACE: ${schema.metadata.namespace}
          KUBECONFIG_SECRET_NAME: k3k-${schema.metadata.name}-kubeconfig
          FLUX_GITREPOSITORY_NAME: ${gitrepository.metadata.name}

    # Task 5: Kustomization resource - deploys from specified path
    # kro automatically creates dependency on gitrepository through CEL reference
    - id: kustomization
      template:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          interval: ${schema.spec.flux.interval}
          retryInterval: ${schema.spec.flux.retryInterval}
          timeout: ${schema.spec.flux.timeout}
          sourceRef:
            kind: GitRepository
            name: ${gitrepository.metadata.name}
          path: ${schema.spec.flux.path}
          prune: true
          wait: true
          postBuild:
            substituteFrom:
              - kind: ConfigMap
                name: ${configmap.metadata.name}

    # Task 9: SecretStore for host-to-tenant secret synchronization
    # Only created when hostSync.secrets.enabled is true
    - id: secretstore
      includeWhen:
        - ${has(schema.spec.hostSync) && has(schema.spec.hostSync.secrets) && schema.spec.hostSync.secrets.enabled == true}
      template:
        apiVersion: external-secrets.io/v1
        kind: SecretStore
        metadata:
          name: ${schema.metadata.namespace}-store
          namespace: ${schema.metadata.namespace}
        spec:
          provider:
            kubernetes:
              remoteNamespace: default
              authRef:
                name: k3k-${schema.metadata.name}-kubeconfig
                key: kubeconfig.yaml

    # Task 10: PushSecret for each secret selector
    # Creates one PushSecret per item in hostSync.secrets.selectors
    - id: pushsecret
      includeWhen:
        - ${has(schema.spec.hostSync) && has(schema.spec.hostSync.secrets) && schema.spec.hostSync.secrets.enabled == true}
      forEach:
        - secretName: ${schema.spec.hostSync.secrets.selectors}
      template:
        apiVersion: external-secrets.io/v1alpha1
        kind: PushSecret
        metadata:
          name: push-${secretName}
          namespace: ${schema.metadata.namespace}
        spec:
          refreshInterval: 10s
          secretStoreRefs:
            - name: ${secretstore.metadata.name}
              kind: SecretStore
          selector:
            secret:
              name: ${secretName}
          data:
            - match:
                secretKey: ""
                remoteRef:
                  remoteKey: ${secretName}

    # Task 7 & 8: CoreDNS addon for DNS forwarding
    # Only created when dns.services is non-empty
    # This Secret wraps a single ConfigMap that will be applied inside the k3k virtual cluster
    # The ConfigMap configures CoreDNS to forward DNS queries for all specified services to the host cluster
    - id: corednsAddon
      includeWhen:
        - ${has(schema.spec.dns) && has(schema.spec.dns.services) && size(schema.spec.dns.services) > 0}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.metadata.name}-coredns-addon
          namespace: ${schema.metadata.namespace}
        stringData:
          coredns-custom.yaml: |
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: coredns-custom
              namespace: kube-system
            data:
              custom.server: |
                ${schema.spec.dns.services.map(s, s + ":53 {\n                errors\n                cache 30\n                forward . " + schema.spec.dns.hostIp + "\n            }").join("\n            ")}
