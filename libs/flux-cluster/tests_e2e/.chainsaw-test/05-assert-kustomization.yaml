# Assert Kustomization is created with correct path
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: test-cluster
  namespace: flux-system
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: setup-test-cluster
  path: ./apps/docs-sync
  prune: true
  wait: true
  timeout: 10m
