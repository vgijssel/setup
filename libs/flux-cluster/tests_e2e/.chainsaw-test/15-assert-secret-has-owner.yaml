# Assert the k3k token secret has owner reference to the Cluster
# This verifies the CronJob successfully patched the secret
apiVersion: v1
kind: Secret
metadata:
  name: k3k-coredns-token-kube-system-test-cluster-cleanup-abc123
  namespace: tenant-test
  labels:
    k3k.io/clusterName: test-cluster-cleanup
  ownerReferences:
    - apiVersion: k3k.io/v1beta1
      kind: Cluster
      name: test-cluster-cleanup
      blockOwnerDeletion: true
