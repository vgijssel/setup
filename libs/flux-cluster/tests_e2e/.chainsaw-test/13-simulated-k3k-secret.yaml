# Simulated k3k token secret
# This mimics the secrets created by k3k-kubelet for ServiceAccount tokens
# These secrets have the k3k.io/clusterName label but no owner reference
apiVersion: v1
kind: Secret
metadata:
  name: k3k-coredns-token-kube-system-test-cluster-cleanup-abc123
  namespace: tenant-test
  labels:
    k3k.io/clusterName: test-cluster-cleanup
  annotations:
    k3k.io/name: k3k-coredns-token
    k3k.io/namespace: kube-system
type: Opaque
data:
  ca.crt: dGVzdC1jYS1jZXJ0
  namespace: a3ViZS1zeXN0ZW0=
  token: dGVzdC10b2tlbg==
