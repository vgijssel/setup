# Assert PushSecrets are created for each selector
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-test-secret-1
  namespace: tenant-test
spec:
  refreshInterval: 10s
  secretStoreRefs:
    - name: tenant-test-store
      kind: SecretStore
  selector:
    secret:
      name: test-secret-1
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-test-secret-2
  namespace: tenant-test
spec:
  refreshInterval: 10s
  secretStoreRefs:
    - name: tenant-test-store
      kind: SecretStore
  selector:
    secret:
      name: test-secret-2
