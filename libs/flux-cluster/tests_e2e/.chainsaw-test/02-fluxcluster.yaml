apiVersion: kro.run/v1alpha1
kind: FluxCluster
metadata:
  name: test-cluster
  namespace: tenant-test
spec:
  # Core cluster configuration
  servers: 1
  agents: 0
  version: v1.34.4-k3s1
  mode: shared
  serviceCIDR: 10.96.0.0/16
  clusterDNS: 10.96.0.10
  tlsSANs:
    - 172.18.0.2
  expose:
    nodePort: {}
  persistence:
    type: dynamic
    storageRequestSize: 2G
  sync:
    secrets:
      enabled: false
    configMaps:
      enabled: true
    services:
      enabled: true
    persistentVolumeClaims:
      enabled: false
    ingresses:
      enabled: true
    priorityClasses:
      enabled: false

  # Flux configuration - required fields
  flux:
    branch: main
    path: ./apps/docs-sync
