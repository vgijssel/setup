apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "relay-server.fullname" . }}
  labels:
    {{- include "relay-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "relay-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-relay-toml.yaml") . | sha256sum }}
      labels:
        {{- include "relay-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: render-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Rendering relay.toml configuration..."
              sed -e "s|\${RELAY_PORT}|${RELAY_PORT}|g" \
                  -e "s|\${RELAY_URL}|${RELAY_URL}|g" \
                  -e "s|\${LOG_LEVEL}|${LOG_LEVEL}|g" \
                  -e "s|\${LOG_FORMAT}|${LOG_FORMAT}|g" \
                  -e "s|\${BACKBLAZE_BUCKET}|${BACKBLAZE_BUCKET}|g" \
                  -e "s|\${BACKBLAZE_KEY_ID}|${BACKBLAZE_KEY_ID}|g" \
                  -e "s|\${BACKBLAZE_APPLICATION_KEY}|${BACKBLAZE_APPLICATION_KEY}|g" \
                  /template/relay.toml.template > /config/relay.toml
              echo "Configuration rendered successfully"
          env:
            - name: RELAY_PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: RELAY_URL
              value: {{ .Values.env.relayServerUrl | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logging.format | quote }}
            - name: BACKBLAZE_BUCKET
              value: {{ .Values.backblaze.bucket | quote }}
            - name: BACKBLAZE_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backblaze.secretName }}
                  key: key_id
            - name: BACKBLAZE_APPLICATION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backblaze.secretName }}
                  key: application_key
          volumeMounts:
            - name: config-template
              mountPath: /template
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/relay.toml
              subPath: relay.toml
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: {{ include "relay-server.fullname" . }}-config
        - name: config
          emptyDir: {}
