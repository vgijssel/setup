apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "relay-server.fullname" . }}
  labels:
    {{- include "relay-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "relay-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-relay-toml.yaml") . | sha256sum }}
      labels:
        {{- include "relay-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            # Server configuration
            - name: PORT
              value: "{{ .Values.service.targetPort }}"
            - name: RELAY_SERVER_URL
              value: "{{ .Values.env.relayServerUrl }}"
            # Logging configuration
            - name: RUST_LOG
              value: "{{ .Values.logging.level }}"
            - name: RELAY_SERVER_LOG_FORMAT
              value: "{{ .Values.logging.format }}"
            # S3 storage configuration
            # Note: Using individual env vars instead of RELAY_SERVER_STORAGE=s3://...
            # because the s3:// URL format hardcodes path_style=false
            - name: STORAGE_PREFIX
              value: "{{ include "relay-server.fullname" . }}"
            - name: AWS_REGION
              value: "{{ .Values.env.awsRegion }}"
            {{- if .Values.env.awsEndpointUrlS3 }}
            - name: AWS_ENDPOINT_URL_S3
              value: "{{ .Values.env.awsEndpointUrlS3 }}"
            {{- end }}
            - name: AWS_S3_USE_PATH_STYLE
              value: "{{ .Values.env.awsS3UsePathStyle }}"
            {{- if .Values.secretReference.name }}
            # Bucket and credentials from secret
            - name: STORAGE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretReference.name }}
                  key: {{ .Values.secretReference.keys.bucket }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretReference.name }}
                  key: {{ .Values.secretReference.keys.awsAccessKeyId }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretReference.name }}
                  key: {{ .Values.secretReference.keys.awsSecretAccessKey }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/relay.toml
              subPath: relay.toml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "relay-server.fullname" . }}-config
