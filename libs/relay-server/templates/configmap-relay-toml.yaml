apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "relay-server.fullname" . }}-config
  labels:
    {{- include "relay-server.labels" . | nindent 4 }}
data:
  relay.toml.template: |
    # Server configuration
    [server]
    host = "0.0.0.0"
    port = ${RELAY_PORT}
    url = "${RELAY_URL}"

    # Logging configuration
    [logging]
    level = "${LOG_LEVEL}"
    format = "${LOG_FORMAT}"

    # Backblaze B2 storage configuration
    [store]
    type = "backblaze"
    bucket = "${BACKBLAZE_BUCKET}"
    key_id = "${BACKBLAZE_KEY_ID}"
    application_key = "${BACKBLAZE_APPLICATION_KEY}"

    # Relay.md public keys
    [[auth]]
    key_id = "relay_2025_10_22"
    public_key = "/6OgBTHaRdWLogewMdyE+7AxnI0/HP3WGqRs/bYBlFg="

    [[auth]]
    key_id = "relay_2025_10_23"
    public_key = "fbm9JLHrwPpST5HAYORTQR/i1VbZ1kdp2ZEy0XpMbf0="
