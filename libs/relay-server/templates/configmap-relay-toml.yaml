apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "relay-server.fullname" . }}-config
  labels:
    {{- include "relay-server.labels" . | nindent 4 }}
data:
  relay.toml.template: |
    # relay.toml - Generated by Helm chart
    [server]
    host = "0.0.0.0"
    port = {{ .Values.service.targetPort }}
    url = "{{ .Values.env.relayServerUrl }}"

    [logging]
    level = "{{ .Values.logging.level }}"
    format = "{{ .Values.logging.format }}"

    [store]
    type = "{{ .Values.env.relayServerStorage }}"
    bucket = "{{ .Values.env.awsBucket }}"
    region = "{{ .Values.env.awsRegion }}"
    {{- if .Values.env.awsEndpointUrlS3 }}
    endpoint = "{{ .Values.env.awsEndpointUrlS3 }}"
    {{- end }}
    path_style = {{ .Values.env.awsS3UsePathStyle }}
    presigned_url_expiration = {{ .Values.store.presignedUrlExpiration }}
    prefix = "{{ include "relay-server.fullname" . }}"
    access_key_id = "__ACCESS_KEY_ID__"
    secret_access_key = "__SECRET_ACCESS_KEY__"
    {{- range .Values.auth }}

    [[auth]]
    key_id = "{{ .keyId }}"
    public_key = "{{ .publicKey }}"
    {{- end }}
