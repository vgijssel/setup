---
# Source: relay-server/templates/configmap-relay-toml.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-server-config
  labels:
    helm.sh/chart: relay-server-0.1.0
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.9.2
data:
  relay.toml.template: |
    # Server configuration
    [server]
    host = "0.0.0.0"
    port = ${RELAY_PORT}
    url = "${RELAY_URL}"

    # Logging configuration
    [logging]
    level = "${LOG_LEVEL}"
    format = "${LOG_FORMAT}"

    # Backblaze B2 storage configuration
    [store]
    type = "backblaze"
    bucket = "${BACKBLAZE_BUCKET}"
    key_id = "${BACKBLAZE_KEY_ID}"
    application_key = "${BACKBLAZE_APPLICATION_KEY}"

    # Relay.md public keys
    [[auth]]
    key_id = "relay_2025_10_22"
    public_key = "/6OgBTHaRdWLogewMdyE+7AxnI0/HP3WGqRs/bYBlFg="

    [[auth]]
    key_id = "relay_2025_10_23"
    public_key = "fbm9JLHrwPpST5HAYORTQR/i1VbZ1kdp2ZEy0XpMbf0="
---
# Source: relay-server/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: relay-server
  labels:
    helm.sh/chart: relay-server-0.1.0
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.9.2
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
---
# Source: relay-server/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-server
  labels:
    helm.sh/chart: relay-server-0.1.0
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.9.2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: relay-server
      app.kubernetes.io/instance: relay-server
  template:
    metadata:
      annotations:
        checksum/config: e9317b34571b49da29882f9c51ff29ea73fbf3c69eaed0b2957f22b6d7fb8c90
      labels:
        app.kubernetes.io/name: relay-server
        app.kubernetes.io/instance: relay-server
    spec:
      initContainers:
        - name: render-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Rendering relay.toml configuration..."
              envsubst '${RELAY_PORT} ${RELAY_URL} ${LOG_LEVEL} ${LOG_FORMAT} ${BACKBLAZE_BUCKET} ${BACKBLAZE_KEY_ID} ${BACKBLAZE_APPLICATION_KEY}' \
                < /template/relay.toml.template \
                > /config/relay.toml
              echo "Configuration rendered successfully"
          env:
            - name: RELAY_PORT
              value: "8080"
            - name: RELAY_URL
              value: "https://relay.example.com"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_FORMAT
              value: "pretty"
            - name: BACKBLAZE_BUCKET
              value: "test-bucket"
            - name: BACKBLAZE_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backblaze-credentials
                  key: key_id
            - name: BACKBLAZE_APPLICATION_KEY
              valueFrom:
                secretKeyRef:
                  name: backblaze-credentials
                  key: application_key
          volumeMounts:
            - name: config-template
              mountPath: /template
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: relay-server
          image: docker.system3.md/relay-server:v0.9.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            tcpSocket:
              port: http
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 5
            tcpSocket:
              port: http
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /app/relay.toml
              subPath: relay.toml
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: relay-server-config
        - name: config
          emptyDir: {}
