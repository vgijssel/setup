---
# Source: relay-server/templates/configmap-relay-toml.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-server-config
  labels:
    helm.sh/chart: relay-server-0.1.0
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.9.2
data:
  relay.toml: |
    # S3 storage configuration with path_style=true
    # Credentials provided via AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY env vars

    [store]
    type = "s3"
    bucket = "test-bucket"
    region = "us-east-1"
    endpoint = "https://s3.example.com"
    path_style = true
    prefix = "relay-server"
---
# Source: relay-server/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: relay-server
  labels:
    helm.sh/chart: relay-server-0.1.0
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.9.2
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
---
# Source: relay-server/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-server
  labels:
    helm.sh/chart: relay-server-0.1.0
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.9.2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: relay-server
      app.kubernetes.io/instance: relay-server
  template:
    metadata:
      annotations:
        checksum/config: cc2d3bd7b12b7e52b8f15ae751ed51eecc33f287163392de78644a27f054641f
      labels:
        app.kubernetes.io/name: relay-server
        app.kubernetes.io/instance: relay-server
    spec:
      containers:
        - name: relay-server
          image: docker.system3.md/relay-server:v0.9.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            tcpSocket:
              port: http
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 5
            tcpSocket:
              port: http
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          env:
            # Server configuration
            - name: PORT
              value: "8080"
            - name: RELAY_SERVER_URL
              value: "https://relay.example.com"
            # Logging configuration
            - name: RUST_LOG
              value: "info"
            - name: RELAY_SERVER_LOG_FORMAT
              value: "pretty"
            # S3 credentials from secret
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: relay-server-secret
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: relay-server-secret
                  key: secretKey
          volumeMounts:
            - name: config
              mountPath: /app/relay.toml
              subPath: relay.toml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: relay-server-config
