---
# Source: relay-server/templates/configmap-relay-toml.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-server-config
  labels:
    helm.sh/chart: relay-server-0.1.0
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.9.2
data:
  relay.toml: |
    # Minimal relay.toml - S3 storage configuration
    # Other settings (server, logging) are configured via environment variables
    # Auth keys use the defaults baked into the container image

    [store]
    type = "s3"
    region = "us-east-1"
    path_style = false
    prefix = "relay-server"
---
# Source: relay-server/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: relay-server
  labels:
    helm.sh/chart: relay-server-0.1.0
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.9.2
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
---
# Source: relay-server/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-server
  labels:
    helm.sh/chart: relay-server-0.1.0
    app.kubernetes.io/name: relay-server
    app.kubernetes.io/instance: relay-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.9.2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: relay-server
      app.kubernetes.io/instance: relay-server
  template:
    metadata:
      annotations:
        checksum/config: e52e762baa33796ed48ec12c9cf33d6d5c24b089b5ccff4a4e711b705cdd1d18
      labels:
        app.kubernetes.io/name: relay-server
        app.kubernetes.io/instance: relay-server
    spec:
      containers:
        - name: relay-server
          image: docker.system3.md/relay-server:v0.9.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            tcpSocket:
              port: http
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 5
            tcpSocket:
              port: http
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          env:
            # Server configuration
            - name: PORT
              value: "8080"
            - name: RELAY_SERVER_URL
              value: "https://relay.example.com"
            # Logging configuration
            - name: RUST_LOG
              value: "info"
            - name: RELAY_SERVER_LOG_FORMAT
              value: "pretty"
            # S3 storage configuration
            # Note: Using individual env vars instead of RELAY_SERVER_STORAGE=s3://...
            # because the s3:// URL format hardcodes path_style=false
            - name: STORAGE_PREFIX
              value: "relay-server"
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_S3_USE_PATH_STYLE
              value: "false"
            # Bucket and credentials from secret
            - name: STORAGE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: relay-server-secret
                  key: bucket
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: relay-server-secret
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: relay-server-secret
                  key: secretKey
          volumeMounts:
            - name: config
              mountPath: /app/relay.toml
              subPath: relay.toml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: relay-server-config
