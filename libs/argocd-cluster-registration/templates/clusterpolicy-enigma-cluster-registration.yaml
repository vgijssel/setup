# yamllint disable-file
{{- $spec := include "argocd-cluster-registration.enigmaPolicySpec" . -}}
{{- $rawName := printf "reg-enigma-%s-%s" .Release.Namespace ($spec | sha256sum | trunc 8) -}}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  # Content-based naming: when spec changes, name changes, old policy is pruned
  name: {{ include "argocd-cluster-registration.truncName" $rawName }}
  annotations:
    policies.kyverno.io/title: Register Enigma Cluster to ArgoCD
    policies.kyverno.io/category: ArgoCD
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Secret
    policies.kyverno.io/description: >-
      Automatically registers the enigma cluster as an ArgoCD destination by transforming
      the argocd-token service account secret into an ArgoCD cluster secret. The generated
      secret is placed in the {{ .Values.secretsNamespace }} namespace and synced to ArgoCD
      vCluster via fromHost configuration.
spec:
{{ $spec | indent 2 }}
