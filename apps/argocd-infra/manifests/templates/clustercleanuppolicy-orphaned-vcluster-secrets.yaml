apiVersion: kyverno.io/v2
kind: ClusterCleanupPolicy
metadata:
  name: cleanup-orphaned-vcluster-secrets
  annotations:
    policies.kyverno.io/title: Cleanup Orphaned vCluster Secrets
    policies.kyverno.io/category: ArgoCD
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Secret
    policies.kyverno.io/description: >-
      Automatically removes orphaned ArgoCD cluster secrets in setup-argocd-secrets
      namespace when their source vCluster secrets or namespaces no longer exist.
      This handles the race condition where namespace deletion cascades too fast
      for Kyverno's synchronize feature to catch the source secret deletion.
spec:
  match:
    any:
      - resources:
          kinds:
            - Secret
          names:
            - vc-*
          namespaces:
            - setup-argocd-secrets
          selector:
            matchLabels:
              argocd.argoproj.io/secret-type: cluster
              app.kubernetes.io/managed-by: kyverno
  conditions:
    any:
      # Cleanup if source namespace doesn't exist
      # The source namespace is stored in the vcluster.io/source-namespace label
      - key: '{{ `{{ request.object.metadata.labels."vcluster.io/source-namespace" || '''' }}` }}'
        operator: AnyNotIn
        value: "{{ `{{ namespaces().*.metadata.name }}` }}"
  # Run every 5 minutes to catch orphaned secrets
  schedule: "*/5 * * * *"
