vcluster:
  controlPlane:
    statefulSet:
      highAvailability:
        replicas: 3
    backingStore:
      etcd:
        deploy:
          statefulSet:
            highAvailability:
              replicas: 3
    advanced:
      # Add Delete=confirm and Prune=confirm annotations to all vCluster resources
      globalMetadata:
        annotations:
          argocd.argoproj.io/sync-options: "Delete=confirm,Prune=confirm"
