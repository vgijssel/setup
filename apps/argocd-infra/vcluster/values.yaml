vcluster:
  sync:
    toHost:
      ingresses:
        enabled: true
    fromHost:
      secrets:
        enabled: true
        mappings:
          byName:
            # Sync all secrets from setup-argocd-cluster-secrets namespace to argocd namespace
            "setup-argocd-cluster-secrets/*": "argocd/*"
  controlPlane:
    statefulSet:
      highAvailability:
        replicas: 3
      pods:
        labels:
          policy.cozystack.io/allow-to-apiserver: "true"
    backingStore:
      etcd:
        deploy:
          enabled: true
          statefulSet:
            highAvailability:
              replicas: 3
            pods:
              labels:
                policy.cozystack.io/allow-to-apiserver: "true"
    coredns:
      embedded: true
  # Enable fallback to host cluster DNS for accessing host services
  networking:
    advanced:
      fallbackHostCluster: true
