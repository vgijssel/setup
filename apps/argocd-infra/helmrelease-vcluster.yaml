apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vc-argocd
  namespace: tenant-prod-argocd
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: third_party/vendir/charts/vcluster
      sourceRef:
        kind: GitRepository
        name: setup-argocd
        namespace: tenant-prod-argocd
      interval: 12h
  targetNamespace: tenant-prod-argocd
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    networking:
      advanced:
        # Enable DNS fallback to host cluster for resolving other vCluster services
        fallbackHostCluster: true
      replicateServices:
        fromHost:
          # Replicate secrets-proxy service from host into vCluster for cross-vCluster connectivity
          # This makes the service available at secrets-proxy.argocd.svc.cluster.local inside vCluster
          - from: "tenant-prod-secretsproxy/secrets-proxy"
            to: "argocd/secrets-proxy"
    sync:
      toHost:
        ingresses:
          enabled: true
      fromHost:
        secrets:
          enabled: true
          mappings:
            byName:
              # Sync all secrets from argocd-clusters namespace to argocd namespace
              # Note: vCluster doesn't support prefix patterns, only full namespace wildcards
              "argocd-clusters/*": "argocd/*"
    controlPlane:
      coredns:
        # Custom CoreDNS config to forward cozy.local queries to host cluster DNS
        overwriteManifests: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: coredns
            namespace: kube-system
          data:
            Corefile: |-
              .:1053 {
                errors
                health
                ready
                rewrite name regex .*\.nodes\.vcluster\.com kubernetes.default.svc.cluster.local
                kubernetes cluster.local in-addr.arpa ip6.arpa {
                  pods insecure
                  fallthrough in-addr.arpa ip6.arpa
                }
                hosts /etc/coredns/NodeHosts {
                  ttl 60
                  reload 15s
                  fallthrough
                }
                prometheus :9153
                forward . /etc/resolv.conf
                cache 30
                loop
                reload
                loadbalance
              }
              cozy.local:1053 {
                errors
                cache 30
                forward . 10.96.0.10
              }
              import /etc/coredns/custom/*.server
      statefulSet:
        highAvailability:
          replicas: 3
        pods:
          labels:
            policy.cozystack.io/allow-to-apiserver: "true"
      backingStore:
        etcd:
          deploy:
            enabled: true
            statefulSet:
              highAvailability:
                replicas: 3
              pods:
                labels:
                  policy.cozystack.io/allow-to-apiserver: "true"
