apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vc-argocd
  namespace: tenant-prod-argocd
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: third_party/vendir/charts/vcluster
      sourceRef:
        kind: GitRepository
        name: setup-argocd
        namespace: tenant-prod-argocd
      interval: 12h
  targetNamespace: tenant-prod-argocd
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    sync:
      toHost:
        ingresses:
          enabled: true
    controlPlane:
      statefulSet:
        highAvailability:
          replicas: 3
        pods:
          labels:
            policy.cozystack.io/allow-to-apiserver: "true"
      backingStore:
        etcd:
          deploy:
            enabled: true
            statefulSet:
              highAvailability:
                replicas: 3
              pods:
                labels:
                  policy.cozystack.io/allow-to-apiserver: "true"
