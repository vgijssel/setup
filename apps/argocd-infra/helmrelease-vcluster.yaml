apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vc-argocd
  namespace: tenant-prod-argocd
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: third_party/vendir/charts/vcluster
      sourceRef:
        kind: GitRepository
        name: setup-argocd
        namespace: tenant-prod-argocd
      interval: 12h
  targetNamespace: tenant-prod-argocd
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    networking:
      advanced:
        # Enable DNS fallback to host cluster for resolving other vCluster services
        fallbackHostCluster: true
    sync:
      toHost:
        ingresses:
          enabled: true
      fromHost:
        secrets:
          enabled: true
          mappings:
            byName:
              # Sync all secrets from argocd-clusters namespace to argocd namespace
              # Note: vCluster doesn't support prefix patterns, only full namespace wildcards
              "argocd-clusters/*": "argocd/*"
    controlPlane:
      statefulSet:
        highAvailability:
          replicas: 3
        pods:
          labels:
            policy.cozystack.io/allow-to-apiserver: "true"
      backingStore:
        etcd:
          deploy:
            enabled: true
            statefulSet:
              highAvailability:
                replicas: 3
              pods:
                labels:
                  policy.cozystack.io/allow-to-apiserver: "true"
