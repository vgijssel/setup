apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docs-sync-b2-proxy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/vgijssel/setup
    targetRevision: mg/feat/deploy-secrets-proxy
    path: libs/aws-sigv4-proxy
    helm:
      values: |
        service:
          type: ClusterIP
        aws:
          secretName: backblaze-s3-docs-infra-prod
  destination:
    name: secrets-proxy
    namespace: secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
