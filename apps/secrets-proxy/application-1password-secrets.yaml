apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 1password-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/vgijssel/setup
    targetRevision: mg/feat/deploy-secrets-proxy
    path: libs/1password-secrets
    helm:
      values: |
        secrets:
          - name: backblaze-s3-docs-infra-prod
            namespace: secrets
            itemPath: vaults/setup-secrets/items/backblaze-s3-docs-infra-prod
  destination:
    name: secrets-proxy
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
