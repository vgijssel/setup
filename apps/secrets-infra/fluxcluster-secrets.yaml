apiVersion: kro.run/v1alpha1
kind: FluxCluster
metadata:
  name: secrets
  namespace: tenant-prod
spec:
  servers: 1
  agents: 0
  version: v1.34.4-k3s1
  tlsSANs:
    - 172.18.0.2
  expose:
    nodePort: {}
  sync:
    # Necessary for CoreDNS to function properly in the cluster
    configMaps:
      enabled: true
    # Necessary for 1Password Connect to function properly in the cluster
    services:
      enabled: true

  # Flux configuration (from gitrepository-setup.yaml and kustomization-secrets.yaml)
  flux:
    branch: mg/chore/upgrade-cozystack
    path: ./apps/secrets

  # DNS forwarding configuration
  dns:
    services:
      - aws-sigv4-proxy-secrets.tenant-prod.svc.cluster.local

  # Host-to-tenant secret synchronization (replaces secretstore-k3k.yaml and pushsecret-1password.yaml)
  hostSync:
    secrets:
      enabled: true
      selectors:
        - 1password-credentials
        - 1password-operator-token
