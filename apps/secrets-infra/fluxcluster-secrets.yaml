# FluxCluster resource that replaces:
# - cluster-secrets.yaml (k3k Cluster)
# - gitrepository-setup.yaml (Flux GitRepository)
# - kustomization-secrets.yaml (Flux Kustomization)
# - secretstore-k3k.yaml (SecretStore)
# - pushsecret-1password.yaml (PushSecrets)
#
# NOTE: service-aws-sigv4-proxy-alias.yaml is NOT part of FluxCluster and must be kept separately
apiVersion: kro.run/v1alpha1
kind: FluxCluster
metadata:
  name: secrets
  namespace: tenant-prod
spec:
  # k3k Cluster configuration (from cluster-secrets.yaml)
  servers: 1
  agents: 0
  version: v1.34.4-k3s1
  mode: shared
  # In shared mode, serviceCIDR must match host cluster to enable service routing
  serviceCIDR: 10.96.0.0/16
  clusterDNS: 10.96.0.10
  tlsSANs:
    - 172.18.0.2
  expose:
    nodePort: {}
  persistence:
    type: dynamic
    storageRequestSize: 2G
  sync:
    secrets:
      enabled: false
    # Necessary for CoreDNS to function properly in the cluster
    configMaps:
      enabled: true
    # Necessary for 1Password Connect to function properly in the cluster
    services:
      enabled: true
    persistentVolumeClaims:
      enabled: false
    ingresses:
      enabled: false
    priorityClasses:
      enabled: false

  # Flux configuration (from gitrepository-setup.yaml and kustomization-secrets.yaml)
  flux:
    branch: mg/chore/upgrade-cozystack
    path: ./apps/secrets

  # DNS forwarding configuration
  # NOTE: This creates addon Secrets but k3k cluster linkage is not yet automatic (Task 7.4 deferred)
  dns:
    hostIp: 10.96.0.10
    services:
      - aws-sigv4-proxy-secrets.tenant-prod.svc.cluster.local

  # Host-to-tenant secret synchronization (replaces secretstore-k3k.yaml and pushsecret-1password.yaml)
  hostSync:
    secrets:
      enabled: true
      selectors:
        - 1password-credentials
        - 1password-operator-token
