apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: tenant-prod-store
spec:
  provider:
    kubernetes:
      # Push secrets to the default namespace in the k3k virtual cluster
      remoteNamespace: default
      server:
        # The k3k cluster exposes its API via a ClusterIP service
        # URL is discovered from tenant-prod-kubeconfig after cluster creation
        # Use short DNS name which is included in the k3k cluster's TLS SANs
        # Service name is based on k3k cluster name "secrets", not namespace
        url: "https://k3k-secrets-service.tenant-prod"
        caProvider:
          type: Secret
          name: tenant-prod-ca
          namespace: tenant-prod
          key: ca.crt
      auth:
        cert:
          clientCert:
            name: tenant-prod-client-cert
            namespace: tenant-prod
            key: tls.crt
          clientKey:
            name: tenant-prod-client-cert
            namespace: tenant-prod
            key: tls.key
