apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: k3k-secrets-store
  namespace: k3k-secrets
spec:
  provider:
    kubernetes:
      # Push secrets to the default namespace in the k3k virtual cluster
      remoteNamespace: default
      server:
        # The k3k cluster exposes its API via a ClusterIP service
        # URL is discovered from k3k-secrets-kubeconfig after cluster creation
        # Use short DNS name which is included in the k3k cluster's TLS SANs
        url: "https://k3k-secrets-service.k3k-secrets"
        caProvider:
          type: Secret
          name: k3k-secrets-ca
          key: ca.crt
      auth:
        cert:
          clientCert:
            name: k3k-secrets-client-cert
            key: tls.crt
          clientKey:
            name: k3k-secrets-client-cert
            key: tls.key
