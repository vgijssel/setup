apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeconfig-extractor
  namespace: tenant-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeconfig-extractor
  namespace: tenant-prod
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeconfig-extractor
  namespace: tenant-prod
subjects:
  - kind: ServiceAccount
    name: kubeconfig-extractor
    namespace: tenant-prod
roleRef:
  kind: Role
  name: kubeconfig-extractor
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: extract-kubeconfig-creds
  namespace: tenant-prod
  annotations:
    description: |
      Extracts CA cert, client cert, and client key from the tenant-prod-kubeconfig
      secret and creates separate secrets for use with External Secrets Operator.
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: kubeconfig-extractor
      restartPolicy: OnFailure
      containers:
        - name: extractor
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Waiting for k3k-secrets-kubeconfig secret..."
              until kubectl -n tenant-prod get secret k3k-secrets-kubeconfig 2>/dev/null; do
                echo "Secret not found, waiting..."
                sleep 5
              done

              echo "Extracting credentials from kubeconfig..."

              # Get the kubeconfig (k3k names secrets based on cluster name "secrets")
              KUBECONFIG_DATA=$(kubectl -n tenant-prod get secret k3k-secrets-kubeconfig \
                -o jsonpath='{.data.kubeconfig\.yaml}' | base64 -d)

              # Extract CA certificate
              CA_CERT=$(echo "$KUBECONFIG_DATA" | yq '.clusters[0].cluster.certificate-authority-data' | base64 -d | base64 -w0)

              # Extract client certificate
              CLIENT_CERT=$(echo "$KUBECONFIG_DATA" | yq '.users[0].user.client-certificate-data' | base64 -d | base64 -w0)

              # Extract client key
              CLIENT_KEY=$(echo "$KUBECONFIG_DATA" | yq '.users[0].user.client-key-data' | base64 -d | base64 -w0)

              # Extract server URL
              SERVER_URL=$(echo "$KUBECONFIG_DATA" | yq '.clusters[0].cluster.server')

              echo "Creating tenant-prod-ca secret..."
              kubectl apply -f - <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: tenant-prod-ca
                namespace: tenant-prod
              type: Opaque
              data:
                ca.crt: ${CA_CERT}
              EOF

              echo "Creating tenant-prod-client-cert secret..."
              kubectl apply -f - <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: tenant-prod-client-cert
                namespace: tenant-prod
              type: Opaque
              data:
                tls.crt: ${CLIENT_CERT}
                tls.key: ${CLIENT_KEY}
              EOF

              echo "Creating tenant-prod-server-url configmap..."
              kubectl apply -f - <<EOF
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: tenant-prod-server-url
                namespace: tenant-prod
              data:
                url: "${SERVER_URL}"
              EOF

              echo "Done! Credentials extracted successfully."
