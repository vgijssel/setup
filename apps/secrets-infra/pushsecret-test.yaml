apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-test-secret
  namespace: k3k-secrets
spec:
  # How often to sync the secret
  refreshInterval: 10s
  # Reference to the SecretStore that connects to the k3k cluster
  secretStoreRefs:
    - name: k3k-secrets-store
      kind: SecretStore
  # Select the source secret in the host cluster
  selector:
    secret:
      name: test-secret-to-push
  # Map source secret keys to the remote secret
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: pushed-secret
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: pushed-secret
          property: password
    - match:
        secretKey: api-key
        remoteRef:
          remoteKey: pushed-secret
          property: api-key
