apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-webhook
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-stage
    internal-networking/expose: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: tenant-prod
  rules:
    - host: argocd-webhook-public.enigma.vgijssel.nl
      http:
        paths:
          - path: /api/webhook
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: https
  tls:
    - hosts:
        - argocd-webhook-public.enigma.vgijssel.nl
      secretName: argocd-server-webhook-tls
