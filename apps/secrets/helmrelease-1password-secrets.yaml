apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: 1password-secrets
  namespace: ${FLUX_NAMESPACE}
spec:
  kubeConfig:
    secretRef:
      name: ${KUBECONFIG_SECRET_NAME}
      key: kubeconfig.yaml
  interval: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ./libs/1password-secrets
      sourceRef:
        kind: GitRepository
        name: ${FLUX_GITREPOSITORY_NAME}
      interval: 12h
      reconcileStrategy: Revision
  targetNamespace: default
  storageNamespace: default
  dependsOn:
    - name: 1password-operator
  install:
    createNamespace: false
    timeout: 1m
    remediation:
      retries: 1
  upgrade:
    timeout: 1m
    remediation:
      retries: 1
  values:
    secrets:
      - name: backblaze-s3-docs-infra-prod
        namespace: secrets
        itemPath: vaults/setup-secrets/items/backblaze-s3-docs-infra-prod
