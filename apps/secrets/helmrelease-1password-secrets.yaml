apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: 1password-secrets
  namespace: flux-system
spec:
  kubeConfig:
    secretRef:
      name: k3k-secrets-kubeconfig
      key: kubeconfig.yaml
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ./libs/1password-secrets
      sourceRef:
        kind: GitRepository
        name: setup
        namespace: flux-system
      interval: 12h
      reconcileStrategy: Revision
  targetNamespace: default
  storageNamespace: default
  dependsOn:
    - name: 1password-operator
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    secrets:
      - name: backblaze-s3-docs-infra-prod
        namespace: secrets
        itemPath: vaults/setup-secrets/items/backblaze-s3-docs-infra-prod
