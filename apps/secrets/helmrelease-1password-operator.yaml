apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: 1password-operator
  namespace: ${FLUX_NAMESPACE}
spec:
  kubeConfig:
    secretRef:
      name: ${KUBECONFIG_SECRET_NAME}
      key: kubeconfig.yaml
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: third_party/vendir/charts/1password-connect
      sourceRef:
        kind: GitRepository
        name: ${FLUX_GITREPOSITORY_NAME}
      interval: 12h
  targetNamespace: default
  storageNamespace: default
  interval: 5m
  install:
    createNamespace: true
    timeout: 1m
    remediation:
      retries: 0
  upgrade:
    timeout: 1m
    remediation:
      retries: 0
  values:
    operator:
      create: true
      watchNamespace: []
      token:
        name: 1password-operator-token
        key: token
    connect:
      create: true
      credentialsName: 1password-credentials
      credentialsKey: 1password-credentials.json
