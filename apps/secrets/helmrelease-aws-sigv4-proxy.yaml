apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aws-sigv4-proxy
  namespace: ${FLUX_NAMESPACE}
spec:
  kubeConfig:
    secretRef:
      name: ${KUBECONFIG_SECRET_NAME}
      key: kubeconfig.yaml
  interval: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ./libs/aws-sigv4-proxy
      sourceRef:
        kind: GitRepository
        name: ${FLUX_GITREPOSITORY_NAME}
      interval: 12h
      reconcileStrategy: Revision
  targetNamespace: secrets
  dependsOn:
    - name: 1password-secrets
  install:
    createNamespace: false
    timeout: 1m
    remediation:
      retries: 0
  upgrade:
    timeout: 1m
    remediation:
      retries: 0
  values:
    service:
      type: ClusterIP
    aws:
      secretName: backblaze-s3-docs-infra-prod
