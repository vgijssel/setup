apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: docs-sync-manifests
  namespace: flux-system
spec:
  kubeConfig:
    secretRef:
      name: k3k-docs-sync-kubeconfig
      key: kubeconfig.yaml
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: setup
  path: ./apps/docs-sync/manifests
  prune: true
  wait: true
  timeout: 10m
