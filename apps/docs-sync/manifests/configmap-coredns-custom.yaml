apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  # Forward tenant-prod.svc.cluster.local queries to host cluster's kube-dns
  # This enables cross-cluster DNS resolution for services synced to tenant-prod
  tenant-prod.server: |
    tenant-prod.svc.cluster.local:53 {
        errors
        cache 30
        forward . 10.96.0.10
    }
