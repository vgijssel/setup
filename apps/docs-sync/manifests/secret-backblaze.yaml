apiVersion: v1
kind: Secret
metadata:
  name: backblaze-credentials
  namespace: relay
stringData:
  bucket: s3-docs-infra-prod
  # Empty credentials - OpenResty sidecar strips these, aws-sigv4-proxy handles signing
  key_id: ""
  application_key: ""
  # Local OpenResty sidecar that strips AWS query params before forwarding to proxy
  endpoint: http://localhost:8081
  region: us-west-004
