apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: relay-family
  namespace: ${FLUX_NAMESPACE}
spec:
  kubeConfig:
    secretRef:
      name: ${KUBECONFIG_SECRET_NAME}
      key: kubeconfig.yaml
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ./libs/relay-server
      sourceRef:
        kind: GitRepository
        name: ${FLUX_GITREPOSITORY_NAME}
      interval: 12h
      reconcileStrategy: Revision
  targetNamespace: relay
  storageNamespace: relay
  install:
    createNamespace: true
    timeout: 1m
    remediation:
      retries: 1
  upgrade:
    timeout: 1m
    remediation:
      retries: 1
  values:
    name: relay-family
    replicaCount: 1
    image:
      repository: docker.system3.md/relay-server
      tag: v0.9.2
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
    resources:
      requests:
        cpu: 40m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    logging:
      level: info
      format: pretty
    backblaze:
      secretName: backblaze-credentials
      pathStyle: true
    signingProxy:
      enabled: true
      upstreamUrl: http://aws-sigv4-proxy-secrets.tenant-prod.svc.cluster.local
    env:
      relayServerUrl: https://family.relay.docs-sync.vgijssel.nl
