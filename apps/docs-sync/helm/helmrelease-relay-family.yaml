apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: relay-family
  namespace: flux-system
spec:
  kubeConfig:
    secretRef:
      name: k3k-docs-sync-kubeconfig
      key: kubeconfig.yaml
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ./libs/relay-server
      sourceRef:
        kind: GitRepository
        name: setup
        namespace: flux-system
      interval: 12h
      reconcileStrategy: Revision
  targetNamespace: relay
  storageNamespace: relay
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    name: relay-family
    replicaCount: 1
    image:
      repository: docker.system3.md/relay-server
      tag: v0.9.2
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
    resources:
      requests:
        cpu: 40m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    logging:
      level: info
      format: pretty
    backblaze:
      secretName: backblaze-credentials
      pathStyle: true
    env:
      relayServerUrl: https://family.relay.docs-sync.vgijssel.nl
