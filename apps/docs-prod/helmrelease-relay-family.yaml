apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: relay-family
  namespace: cozy-fluxcd
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: libs/relay-server
      sourceRef:
        kind: GitRepository
        name: setup
        namespace: cozy-fluxcd
      interval: 12h
      reconcileStrategy: Revision
  targetNamespace: relay
  dependsOn:
    - name: 1password-secrets
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    name: relay-family
    replicaCount: 1
    image:
      repository: docker.system3.md/relay-server
      tag: v0.9.2
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 40m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    logging:
      level: debug
      format: pretty
    env:
      relayServerUrl: https://family.relay.enigma.vgijssel.nl
      awsRegion: us-east-1
      awsEndpointUrlS3: https://s3.enigma.vgijssel.nl
    # Reference the 1Password-managed secret
    # Note: 1Password item has keys: accessKey, secretKey, bucket, endpoint
    secretReference:
      name: relay-family-s3-credentials
      keys:
        awsAccessKeyId: accessKey
        awsSecretAccessKey: secretKey
        bucket: bucket
