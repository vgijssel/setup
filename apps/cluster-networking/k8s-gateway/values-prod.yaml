# Production overrides: expose DNS on the VLAN via MetalLB.
# The requested IP must live inside an IPAddressPool on the enigma cluster
# (see apps/enigma-cluster/metallb-ip-address-pool.yml).
k8s-gateway:
  service:
    type: LoadBalancer
    loadBalancerIP: 192.168.50.102
  replicaCount: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
