apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pr-apps-helm
  namespace: argocd
spec:
  goTemplate: true

  # Progressive Sync strategy with reverse deletion order
  # Applications are deleted in REVERSE order of steps
  strategy:
    type: RollingSync
    deletionOrder: Reverse
    rollingSync:
      steps:
        # Step 1: Tenant namespace - created FIRST, deleted LAST
        - matchExpressions:
            - key: app-type
              operator: In
              values:
                - tenant

        # Step 2: vCluster - created SECOND, deleted SECOND-TO-LAST
        - matchExpressions:
            - key: app-type
              operator: In
              values:
                - vcluster

        # Step 3: Apps inside vCluster - created LAST, deleted FIRST
        - matchExpressions:
            - key: app-type
              operator: In
              values:
                - app

  generators:
    - matrix:
        generators:
          - pullRequest:
              github:
                owner: vgijssel
                repo: setup
                labels:
                  - apps:secrets-proxy
                tokenRef:
                  secretName: github-token
                  key: token
              requeueAfterSeconds: 1800
          - selector:
              matchExpressions:
                - key: helm
                  operator: In
                  values:
                    - "true"
            git:
              repoURL: https://github.com/vgijssel/setup.git
              revision: "{{.head_sha}}"
              files:
                - path: apps/secrets-proxy/*/config.json
                - path: apps/secrets-proxy-infra/*/config.json
  template:
    metadata:
      name: "{{index .path.segments 1}}-{{index .path.segments 2}}pr{{.number}}"
      labels:
        pr: "pr{{.number}}"
        # app-type label for Progressive Sync step matching
        app-type: >-
          {{- if eq (index .path.segments 1) "secrets-proxy-infra" -}}
            {{- if eq (index .path.segments 2) "tenant" -}}tenant
            {{- else if eq (index .path.segments 2) "vcluster" -}}vcluster
            {{- else -}}infra{{- end -}}
          {{- else -}}app{{- end -}}
    spec:
      project: default
      source:
        repoURL: https://github.com/vgijssel/setup.git
        targetRevision: "{{.head_sha}}"
        path: "{{.path.path}}"
        helm:
          valueFiles:
            - values.yaml
          parameters:
            - name: prNumber
              value: "{{.number}}"
            - name: tenant.prNumber
              value: "{{.number}}"
            - name: vcluster.controlPlane.ingress.host
              value: "api-{{index .path.segments 1}}-{{index .path.segments 2}}pr{{.number}}.enigma.vgijssel.nl"
      destination:
        name: '{{if eq .cluster "enigma"}}enigma{{else}}{{.cluster}}pr{{.number}}{{end}}'
        namespace: '{{if eq .updateNamespace "true"}}{{.namespace}}pr{{.number}}{{else}}{{.namespace}}{{end}}'
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - PruneLast=true
      info:
        - name: PR
          value: "https://github.com/vgijssel/setup/pull/{{.number}}"
        - name: Branch
          value: "{{.branch}}"
  templatePatch: |
    {{- if ne .skipNamespaceCreation "true" }}
    spec:
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
    {{- end }}
