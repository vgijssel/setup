apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-helm
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - selector:
        matchExpressions:
          - key: helm
            operator: In
            values:
              - "true"
      git:
        repoURL: https://github.com/vgijssel/setup.git
        revision: main
        files:
          - path: apps/*/*/config.json
  template:
    metadata:
      name: "{{index .path.segments 1}}-{{index .path.segments 2}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/vgijssel/setup.git
        targetRevision: main
        path: "{{.path.path}}"
        helm:
          valueFiles:
            - values.yaml
            - values-prod.yaml
      destination:
        name: "{{.cluster}}"
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - PruneLast=true
  templatePatch: |
    {{- if ne .skipNamespaceCreation "true" }}
    spec:
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
    {{- end }}
