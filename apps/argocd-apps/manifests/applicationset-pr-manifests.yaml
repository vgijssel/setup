apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pr-apps-manifests
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - pullRequest:
              github:
                owner: vgijssel
                repo: setup
                labels:
                  - apps:secrets-proxy
                tokenRef:
                  secretName: github-token
                  key: token
              requeueAfterSeconds: 1800
          - selector:
              matchExpressions:
                - key: helm
                  operator: In
                  values:
                    - "false"
            git:
              repoURL: https://github.com/vgijssel/setup.git
              revision: "{{.head_sha}}"
              files:
                - path: apps/secrets-proxy/*/config.json
                - path: apps/secrets-proxy-infra/*/config.json
  template:
    metadata:
      name: "{{index .path.segments 1}}-{{index .path.segments 2}}pr{{.number}}"
      labels:
        pr: "pr{{.number}}"
      annotations:
        # Sync waves control deletion order (reversed):
        # Creation: -10 → -5 → 0 → 10 (lowest first)
        # Deletion: 10 → 0 → -5 → -10 (highest first)
        # This ensures apps inside vcluster are deleted before the vcluster itself
        argocd.argoproj.io/sync-wave: >-
          {{- if eq (index .path.segments 1) "secrets-proxy-infra" -}}
            {{- if eq (index .path.segments 2) "tenant" -}}-10
            {{- else if eq (index .path.segments 2) "vcluster" -}}-5
            {{- else -}}0{{- end -}}
          {{- else -}}10{{- end -}}
    spec:
      project: default
      source:
        repoURL: https://github.com/vgijssel/setup.git
        targetRevision: "{{.head_sha}}"
        path: "{{.path.path}}"
      destination:
        name: "{{.cluster}}"
        namespace: "{{.namespace}}pr{{.number}}"
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PruneLast=true
      info:
        - name: PR
          value: "https://github.com/vgijssel/setup/pull/{{.number}}"
        - name: Branch
          value: "{{.branch}}"
