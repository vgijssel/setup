# Modified TX Ultimate template for Home Assistant control
# Based on: https://github.com/SmartHome-yourself/sonoff-tx-ultimate-for-esphome
#
# Behavior:
# - When API connected: fires events only, HASS controls everything
# - When API disconnected: falls back to direct relay toggle
# - No automatic LED effects from ESPHome - HASS controls LEDs via the light entities

substitutions:
  # These should be overridden by the including file
  relay_count: "1"

  vibra_time: 150ms
  button_on_time: 500ms

  # LED colors (0-100 scale)
  button_brightness: "0.7"
  button_color: "{0,0,100}"

  nightlight: "off"
  nightlight_brightness: "0.2"
  nightlight_color: "{80,70,0}"

  latitude: 50.123456°
  longitude: 5.654321°

  # GPIO pins
  relay_1_pin: GPIO18
  relay_2_pin: GPIO17
  relay_3_pin: GPIO27
  relay_4_pin: GPIO23

  vibra_motor_pin: GPIO21
  pa_power_pin: GPIO26

  led_pin: GPIO13
  status_led_pin: GPIO33

  uart_tx_pin: GPIO19
  uart_rx_pin: GPIO22

  audio_lrclk_pin: GPIO4
  audio_bclk_pin: GPIO2
  audio_sdata_pin: GPIO15

  touchpanel_power_pin: GPIO5

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - binary_sensor.template.publish:
          id: touchfield_1
          state: OFF
      - binary_sensor.template.publish:
          id: touchfield_2
          state: OFF
      - binary_sensor.template.publish:
          id: touchfield_3
          state: OFF
      - binary_sensor.template.publish:
          id: multi_touch
          state: OFF
      - binary_sensor.template.publish:
          id: swipe_left
          state: OFF
      - binary_sensor.template.publish:
          id: swipe_right
          state: OFF
      - binary_sensor.template.publish:
          id: long_press
          state: OFF
      - script.execute: refresh_led_default
      - script.execute: refresh_nightlight

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source:
      type: git
      url: https://github.com/SmartHome-yourself/sonoff-tx-ultimate-for-esphome
      ref: main
    components: [tx_ultimate_touch]

globals:
  - id: nightlight_color
    type: int [3]
    restore_value: no
    initial_value: ${nightlight_color}
  - id: button_color
    type: int [3]
    restore_value: no
    initial_value: ${button_color}

binary_sensor:
  - platform: template
    name: Touchfield 1
    id: touchfield_1
    on_press:
      - if:
          condition:
            and:
              - wifi.connected:
              - api.connected:
          # API connected: fire event only, let HASS handle it
          then:
            - homeassistant.event:
                event: esphome.tx_ultimate_touch
                data:
                  device_id: ${name}
                  button: "1"
                  action: press
          # API disconnected: toggle relay directly as fallback
          else:
            - switch.toggle: relay_1
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: touchfield_1
          state: OFF

  - platform: template
    name: Touchfield 2
    id: touchfield_2
    on_press:
      - if:
          condition:
            and:
              - wifi.connected:
              - api.connected:
          then:
            - homeassistant.event:
                event: esphome.tx_ultimate_touch
                data:
                  device_id: ${name}
                  button: "2"
                  action: press
          else:
            - switch.toggle: relay_2
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: touchfield_2
          state: OFF

  - platform: template
    name: Touchfield 3
    id: touchfield_3
    on_press:
      - if:
          condition:
            and:
              - wifi.connected:
              - api.connected:
          then:
            - homeassistant.event:
                event: esphome.tx_ultimate_touch
                data:
                  device_id: ${name}
                  button: "3"
                  action: press
          else:
            - switch.toggle: relay_3
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: touchfield_3
          state: OFF

  - platform: template
    name: Swipe left
    id: swipe_left
    on_press:
      - if:
          condition:
            and:
              - wifi.connected:
              - api.connected:
          then:
            - homeassistant.event:
                event: esphome.tx_ultimate_touch
                data:
                  device_id: ${name}
                  action: swipe_left
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: swipe_left
          state: OFF

  - platform: template
    name: Swipe_right
    id: swipe_right
    on_press:
      - if:
          condition:
            and:
              - wifi.connected:
              - api.connected:
          then:
            - homeassistant.event:
                event: esphome.tx_ultimate_touch
                data:
                  device_id: ${name}
                  action: swipe_right
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: swipe_right
          state: OFF

  - platform: template
    name: Multi Touch
    id: multi_touch
    on_press:
      - if:
          condition:
            and:
              - wifi.connected:
              - api.connected:
          then:
            - homeassistant.event:
                event: esphome.tx_ultimate_touch
                data:
                  device_id: ${name}
                  action: multi_touch
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: multi_touch
          state: OFF

  - platform: template
    name: Long Press
    id: long_press
    on_press:
      - if:
          condition:
            and:
              - wifi.connected:
              - api.connected:
          then:
            - homeassistant.event:
                event: esphome.tx_ultimate_touch
                data:
                  device_id: ${name}
                  action: long_press
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: long_press
          state: OFF

switch:
  - platform: gpio
    id: relay_1
    name: "${friendly_name} L1"
    pin: ${relay_1_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: gpio
    id: relay_2
    name: "${friendly_name} L2"
    pin: ${relay_2_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: gpio
    id: relay_3
    name: "${friendly_name} L3"
    pin: ${relay_3_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: gpio
    id: vibra
    pin: ${vibra_motor_pin}
    name: "${friendly_name} Vibration"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${vibra_time}
      - switch.turn_off: vibra

  - platform: gpio
    id: pa_power
    pin: ${pa_power_pin}
    name: PA Power
    internal: true
    restore_mode: ALWAYS_ON

  - platform: gpio
    name: touch panel power
    pin:
      number: ${touchpanel_power_pin}
      inverted: true
    id: touch_power
    internal: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: Nightlight
    id: nightlight_switch
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: template
    name: Nightlight Active
    id: nightlight_active
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

light:
  - platform: neopixelbus
    type: GRB
    variant: WS2811
    pin: ${led_pin}
    num_leds: 28
    name: NeoPixel Light
    id: leds
    default_transition_length: 0s
    effects:
      - addressable_rainbow:
          name: Rainbow
          speed: 30
          width: 8
      - pulse:
          name: Pulse
          transition_length: 1.4s
          update_interval: 1s

    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: partition
    name: LEDs Button right
    id: leds_button_right
    segments:
      - id: leds
        from: 7
        to: 7
  - platform: partition
    name: LEDs Button middle
    id: leds_button_middle
    segments:
      - id: leds
        from: 9
        to: 9
  - platform: partition
    name: LEDs Button left
    id: leds_button_left
    segments:
      - id: leds
        from: 11
        to: 11

  - platform: partition
    name: LEDs Nightlight
    id: leds_nightlight
    segments:
      - id: leds
        from: 0
        to: 6
      - id: leds
        from: 8
        to: 8
      - id: leds
        from: 10
        to: 10
      - id: leds
        from: 12
        to: 19
      - id: leds
        from: 27
        to: 27
      - id: leds_top
        from: 0
        to: 6

  - platform: partition
    name: LEDs Top
    id: leds_top
    segments:
      - id: leds
        from: 20
        to: 26
    effects:
      - addressable_scan:
          name: Scan
      - addressable_rainbow:
          name: Rainbow
          speed: 10
          width: 20

media_player:
  - platform: i2s_audio
    id: media_out
    name: ${friendly_name} Player
    dac_type: external
    i2s_dout_pin: ${audio_sdata_pin}
    i2s_audio_id: audio_i2s
    i2s_comm_fmt: lsb
    mode: mono

i2s_audio:
  id: audio_i2s
  i2s_lrclk_pin: ${audio_lrclk_pin}
  i2s_bclk_pin: ${audio_bclk_pin}

uart:
  tx_pin: ${uart_tx_pin}
  rx_pin: ${uart_rx_pin}
  id: my_uart
  baud_rate: 115200
  data_bits: 8
  stop_bits: 1
  parity: NONE

tx_ultimate_touch:
  id: tx_touch
  uart: my_uart

  on_press:
    # No LED effects on press - HASS controls LEDs
    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_press", "Touch Position: %d / State: %d", touch.x, touch.state);

  on_release:
    - script.execute:
        id: handle_release
        pos: !lambda return touch.x;

    - switch.turn_on: vibra

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_release", "Release Position: %d / State: %d", touch.x, touch.state);

  on_swipe_left:
    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: swipe_left
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_swipe_left", "Swipe Left Position: %d / State: %d", touch.x, touch.state);

  on_swipe_right:
    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: swipe_right
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_swipe_right", "Swipe Right Position: %d / State: %d", touch.x, touch.state);

  on_full_touch_release:
    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: multi_touch
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_full_touch_release", "Full Touch Release Position: %d / State: %d", touch.x, touch.state);

  on_long_touch_release:
    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: long_press
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_long_touch_release", "Long Touch Release Position: %d / State: %d", touch.x, touch.state);

time:
  - platform: homeassistant
    id: homeassistant_time
  - platform: sntp
    id: sntp_time
    on_time:
      # Every 5 minutes
      - seconds: 0
        minutes: /5
        then:
          - script.execute: refresh_nightlight

sun:
  latitude: ${latitude}
  longitude: ${longitude}

script:
  - id: refresh_nightlight
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return "${nightlight}" == "on";'
          then:
            - if:
                condition:
                  - sun.is_below_horizon:
                then:
                  - switch.turn_on:
                      id: nightlight_switch
                else:
                  - switch.turn_off:
                      id: nightlight_switch

  - id: refresh_led_default
    mode: restart
    then:
      - light.turn_off: leds_top

      - if:
          condition:
            lambda: "return (${relay_count}>1 && id(relay_1).state) ;"
          then:
            - script.execute: led_on_button_left
          else:
            - script.execute: led_off_button_left

      - if:
          condition:
            lambda: "return (${relay_count}==3 && id(relay_2).state) || (${relay_count}==1 && id(relay_1).state);"
          then:
            - script.execute: led_on_button_middle
          else:
            - script.execute: led_off_button_middle

      - if:
          condition:
            lambda: "return (${relay_count}==2 && id(relay_2).state) || (${relay_count}==3 && id(relay_3).state);"
          then:
            - script.execute: led_on_button_right
          else:
            - script.execute: led_off_button_right

      - if:
          condition:
            lambda: return id(nightlight_switch).state || id(nightlight_active).state;
          then:
            - script.execute: led_on_nightlight
          else:
            - light.turn_off: leds_nightlight

  - id: led_on_button_left
    mode: restart
    then:
      - light.turn_on:
          id: leds_button_left
          brightness: ${button_brightness}
          red: !lambda return id(button_color)[0]/100.0;
          green: !lambda return id(button_color)[1]/100.0;
          blue: !lambda return id(button_color)[2]/100.0;

  - id: led_on_button_middle
    mode: restart
    then:
      - light.turn_on:
          id: leds_button_middle
          brightness: ${button_brightness}
          red: !lambda return id(button_color)[0]/100.0;
          green: !lambda return id(button_color)[1]/100.0;
          blue: !lambda return id(button_color)[2]/100.0;

  - id: led_on_button_right
    mode: restart
    then:
      - light.turn_on:
          id: leds_button_right
          brightness: ${button_brightness}
          red: !lambda return id(button_color)[0]/100.0;
          green: !lambda return id(button_color)[1]/100.0;
          blue: !lambda return id(button_color)[2]/100.0;

  - id: led_off_button_left
    mode: restart
    then:
      - if:
          condition:
            lambda: return id(nightlight_switch).state || id(nightlight_active).state;
          then:
            - light.turn_on:
                id: leds_button_left
                brightness: ${nightlight_brightness}
                red: !lambda return id(nightlight_color)[0]/100.0;
                green: !lambda return id(nightlight_color)[1]/100.0;
                blue: !lambda return id(nightlight_color)[2]/100.0;
          else:
            - light.turn_off:
                id: leds_button_left

  - id: led_off_button_middle
    mode: restart
    then:
      - if:
          condition:
            lambda: return id(nightlight_switch).state || id(nightlight_active).state;
          then:
            - light.turn_on:
                id: leds_button_middle
                brightness: ${nightlight_brightness}
                red: !lambda return id(nightlight_color)[0]/100.0;
                green: !lambda return id(nightlight_color)[1]/100.0;
                blue: !lambda return id(nightlight_color)[2]/100.0;
          else:
            - light.turn_off:
                id: leds_button_middle

  - id: led_off_button_right
    mode: restart
    then:
      - if:
          condition:
            lambda: return id(nightlight_switch).state || id(nightlight_active).state;
          then:
            - light.turn_on:
                id: leds_button_right
                brightness: ${nightlight_brightness}
                red: !lambda return id(nightlight_color)[0]/100.0;
                green: !lambda return id(nightlight_color)[1]/100.0;
                blue: !lambda return id(nightlight_color)[2]/100.0;
          else:
            - light.turn_off:
                id: leds_button_right

  - id: led_on_nightlight
    mode: restart
    then:
      - light.turn_on:
          id: leds_nightlight
          brightness: ${nightlight_brightness}
          red: !lambda return id(nightlight_color)[0]/100.0;
          green: !lambda return id(nightlight_color)[1]/100.0;
          blue: !lambda return id(nightlight_color)[2]/100.0;

  - id: handle_release
    mode: restart
    parameters:
      pos: int
    then:
      - if:
          condition:
            lambda: "return ${relay_count}==1;"
          then:
            - binary_sensor.template.publish:
                id: touchfield_1
                state: ON

      - if:
          condition:
            lambda: "return ${relay_count}==2;"
          then:
            - if:
                condition:
                  lambda: return pos <= 5;
                then:
                  - binary_sensor.template.publish:
                      id: touchfield_1
                      state: ON

                else:
                  - binary_sensor.template.publish:
                      id: touchfield_2
                      state: ON

      - if:
          condition:
            lambda: "return ${relay_count}==3;"
          then:
            - if:
                condition:
                  lambda: return pos <= 3;
                then:
                  - binary_sensor.template.publish:
                      id: touchfield_1
                      state: ON

                else:
                  - if:
                      condition:
                        lambda: return pos <= 7;
                      then:
                        - binary_sensor.template.publish:
                            id: touchfield_2
                            state: ON

                      else:
                        - binary_sensor.template.publish:
                            id: touchfield_3
                            state: ON
