      CREDENTIALS_REF: op://setup-secrets/setup-secrets Credentials File/1password-credentials.json
      TOKEN_REF: op://setup-secrets/aj4q4vzcvwkcupkmaraoow4ole/credential
      NAMESPACE: setup-secrets-proxy-secrets
    options:
      runInCI: false
