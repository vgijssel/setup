language: javascript
layer: application
tags:
  - scope.app
  - type.stack
  - kubernetes
  - argocd
  - vcluster
  - secrets-proxy
tasks:
  create-1password-secret:
    script: $MOON_WORKSPACE_ROOT/libs/1password-operator-bootstrap/bootstrap.sh --credentials-ref "$CREDENTIALS_REF" --token-ref "$TOKEN_REF" --namespace tenant-prod-secretsproxy
