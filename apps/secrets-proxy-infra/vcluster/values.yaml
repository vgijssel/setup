vcluster:
  sync:
    toHost:
      ingresses:
        enabled: true
    fromHost:
      secrets:
        enabled: true
        mappings:
          byName:
            # Sync all secrets from setup-secrets-proxy-secrets namespace to default namespace in vcluster
            setup-secrets-proxy-secrets/*: default/*
  controlPlane:
    statefulSet:
      highAvailability:
        replicas: 1
      pods:
        labels:
          policy.cozystack.io/allow-to-apiserver: "true"
    backingStore:
      etcd:
        deploy:
          enabled: true
          statefulSet:
            highAvailability:
              replicas: 1
            pods:
              labels:
                policy.cozystack.io/allow-to-apiserver: "true"
    ingress:
      enabled: true
      host: api-secrets-proxy-infra-vcluster.enigma.vgijssel.nl
      spec:
        ingressClassName: tenant-prod
