# Production overrides for secrets-proxy vcluster
vcluster:
  controlPlane:
    statefulSet:
      highAvailability:
        replicas: 3
    backingStore:
      etcd:
        deploy:
          statefulSet:
            highAvailability:
              replicas: 3
    ingress:
      enabled: true
      host: api-secrets-proxy-vcluster.enigma.vgijssel.nl
      spec:
        ingressClassName: tenant-prod
