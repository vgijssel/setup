$schema: ./cache/schemas/workspace.json
hasher:
  walkStrategy: vcs
remote:
  host: grpc://127.0.0.1:9092
  cache:
    compression: zstd
    verifyIntegrity: false
projects:
  globs:
    - apps/*
    - libs/*
    - third_party/*
    - third_party/javascript/tools/*
    - "!third_party/hermit"
  sources:
    devcontainer: .devcontainer
vcs:
  defaultBranch: main
  provider: github
